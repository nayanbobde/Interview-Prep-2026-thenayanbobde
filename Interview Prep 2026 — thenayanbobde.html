LECT * retrieves unnecessary columns, increasing I/O, memory usage, and query execution time.","children":[],"payload":{"tag":"li","lines":"191,193"}}],"payload":{"tag":"h4","lines":"190,191"}},{"content":"How do indexes improve performance?","children":[{"content":"Indexes speed up data retrieval by enabling Index Seeks instead of scanning the entire table.","children":[],"payload":{"tag":"li","lines":"194,196"}}],"payload":{"tag":"h4","lines":"193,194"}},{"content":"What is the difference between Index Seek and Index Scan?","children":[{"content":"Index Seek fetches only matching rows, while Index Scan reads the entire index, making it slower.","children":[],"payload":{"tag":"li","lines":"197,199"}}],"payload":{"tag":"h4","lines":"196,197"}},{"content":"What causes table scans?","children":[{"content":"Missing indexes, SELECT *, functions on indexed columns, and non-sargable conditions can cause table scans.","children":[],"payload":{"tag":"li","lines":"200,202"}}],"payload":{"tag":"h4","lines":"199,200"}},{"content":"How do you identify slow-running SQL queries?","children":[{"content":"I use the Execution Plan and analyze query execution time, logical reads, and CPU usage to identify bottlenecks.","children":[],"payload":{"tag":"li","lines":"203,205"}}],"payload":{"tag":"h4","lines":"202,203"}},{"content":"What is an Execution Plan?","children":[{"content":"An Execution Plan shows how SQL Server executes a query and highlights costly operations such as scans, joins, and sorts.","children":[],"payload":{"tag":"li","lines":"206,208"}}],"payload":{"tag":"h4","lines":"205,206"}},{"content":"How do you optimize JOINs?","children":[{"content":"I join indexed columns, filter data before joining, and use the appropriate join type based on the requirement.","children":[],"payload":{"tag":"li","lines":"209,211"}}],"payload":{"tag":"h4","lines":"208,209"}},{"content":"Which JOIN is most expensive and why?","children":[{"content":"FULL OUTER JOIN is generally the most expensive because it returns matching and non-matching rows from both tables.","children":[],"payload":{"tag":"li","lines":"212,214"}}],"payload":{"tag":"h4","lines":"211,212"}},{"content":"CTE vs Temp Table &#x2013; which performs better?","children":[{"content":"CTEs are better for simple one-time queries, while Temp Tables perform better for large datasets and reused intermediate results.","children":[],"payload":{"tag":"li","lines":"215,217"}}],"payload":{"tag":"h4","lines":"214,215"}},{"content":"EXISTS vs IN &#x2013; which is faster?","children":[{"content":"EXISTS is generally faster for large datasets because it stops after finding the first matching record.","children":[],"payload":{"tag":"li","lines":"218,220"}}],"payload":{"tag":"h4","lines":"217,218"}},{"content":"UNION vs UNION ALL &#x2013; performance difference?","children":[{"content":"UNION ALL is faster because it doesn&apos;t perform duplicate removal, unlike UNION.","children":[],"payload":{"tag":"li","lines":"221,223"}}],"payload":{"tag":"h4","lines":"220,221"}},{"content":"How do you optimize GROUP BY queries?","children":[{"content":"I filter data before grouping, group only required columns, and use indexes on grouping columns when possible.","children":[],"payload":{"tag":"li","lines":"224,226"}}],"payload":{"tag":"h4","lines":"223,224"}},{"content":"View vs Stored Procedure &#x2013; performance comparison?","children":[{"content":"Stored Procedures generally perform better for complex operations because execution plans can be reused, while Views simplify data access.","children":[],"payload":{"tag":"li","lines":"227,229"}}],"payload":{"tag":"h4","lines":"226,227"}},{"content":"How did SQL improve your Power BI refresh time?","children":[{"content":"I reduced the data loaded into Power BI by filtering and aggregating data in SQL, which improved refresh performance.","children":[],"payload":{"tag":"li","lines":"230,232"}}],"payload":{"tag":"h4","lines":"229,230"}},{"content":"What are clustered indexes?","children":[{"content":"Clustered indexes store the table data physically in sorted order, allowing only one clustered index per table.","children":[],"payload":{"tag":"li","lines":"233,235"}}],"payload":{"tag":"h4","lines":"232,233"}},{"content":"What are non-clustered indexes?","children":[{"content":"Non-clustered indexes store a separate index structure with pointers to the actual table data, allowing multiple indexes per table.","children":[],"payload":{"tag":"li","lines":"236,238"}}],"payload":{"tag":"h4","lines":"235,236"}},{"content":"Primary Key vs Unique Index?","children":[{"content":"A Primary Key uniquely identifies each row and automatically creates a clustered index by default, while a Unique Index only enforces uniqueness.","children":[],"payload":{"tag":"li","lines":"239,241"}}],"payload":{"tag":"h4","lines":"238,239"}},{"content":"Why partition large tables?","children":[{"content":"Partitioning splits large tables into smaller logical partitions, improving query performance and maintenance.","children":[],"payload":{"tag":"li","lines":"242,244"}}],"payload":{"tag":"h4","lines":"241,242"}},{"content":"Why update statistics?","children":[{"content":"Updating statistics helps the SQL optimizer choose the most efficient execution plan based on current data distribution.","children":[],"payload":{"tag":"li","lines":"245,247"}}],"payload":{"tag":"h4","lines":"244,245"}},{"content":"Why rebuild indexes?","children":[{"content":"Rebuilding indexes removes fragmentation and improves query performance by reorganizing index pages.","children":[],"payload":{"tag":"li","lines":"248,250"}}],"payload":{"tag":"h4","lines":"247,248"}},{"content":"Locking vs Blocking?","children":[{"content":"Locking is SQL Server securing data during transactions, while Blocking occurs when one transaction waits for another to release a lock.","children":[],"payload":{"tag":"li","lines":"251,253"}}],"payload":{"tag":"h4","lines":"250,251"}},{"content":"What are deadlocks?","children":[{"content":"A deadlock occurs when two or more transactions wait on each other indefinitely, and SQL Server automatically terminates one transaction.","children":[],"payload":{"tag":"li","lines":"254,256"}}],"payload":{"tag":"h4","lines":"253,254"}},{"content":"How is TempDB used?","children":[{"content":"TempDB is used to store temporary tables, table variables, sorting operations, intermediate query results, and worktables.","children":[],"payload":{"tag":"li","lines":"257,259"}}],"payload":{"tag":"h4","lines":"256,257"}},{"content":"Why avoid cursors?","children":[{"content":"Cursors process data row by row and are slower, so set-based SQL operations are preferred for better performance.","children":[],"payload":{"tag":"li","lines":"260,262"}}],"payload":{"tag":"h4","lines":"259,260"}}],"payload":{"tag":"h3","lines":"185,186"}},{"content":"Power BI Performance","children":[{"content":"How did you optimize Power BI reports?","children":[{"content":"I optimized Power BI reports by using a Star Schema, efficient DAX measures, removing unnecessary columns, and reducing the data loaded into the model.","children":[],"payload":{"tag":"li","lines":"265,267"}}],"payload":{"tag":"h4","lines":"264,265"}},{"content":"How did you improve dashboard performance?","children":[{"content":"I improved dashboard performance by optimizing SQL queries, reducing model size, using Star Schema, and minimizing complex visuals and DAX calculations.","children":[],"payload":{"tag":"li","lines":"268,270"}}],"payload":{"tag":"h4","lines":"267,268"}},{"content":"Why did you use Star Schema instead of a Flat Table?","children":[{"content":"I used a Star Schema because it reduces redundancy, improves query performance, and simplifies relationships compared to a flat table.","children":[],"payload":{"tag":"li","lines":"271,273"}}],"payload":{"tag":"h4","lines":"270,271"}},{"content":"How do relationships affect report performance?","children":[{"content":"Relationships affect performance because well-designed one-to-many relationships with single-direction filtering reduce unnecessary data processing.","children":[],"payload":{"tag":"li","lines":"274,276"}}],"payload":{"tag":"h4","lines":"273,274"}},{"content":"Import Mode vs DirectQuery?","children":[{"content":"Import Mode stores data in Power BI memory for faster performance, while DirectQuery retrieves data from the source in real time.","children":[],"payload":{"tag":"li","lines":"277,279"}}],"payload":{"tag":"h4","lines":"276,277"}},{"content":"Import Mode vs Direct Lake?","children":[{"content":"Import Mode loads data into memory, whereas Direct Lake reads data directly from OneLake without importing, providing near Import Mode performance.","children":[],"payload":{"tag":"li","lines":"280,282"}}],"payload":{"tag":"h4","lines":"279,280"}},{"content":"Why did you use Incremental Refresh?","children":[{"content":"I used Incremental Refresh to refresh only new or changed data instead of the entire dataset, reducing refresh time.","children":[],"payload":{"tag":"li","lines":"283,285"}}],"payload":{"tag":"h4","lines":"282,283"}},{"content":"How does Incremental Refresh work?","children":[{"content":"Incremental Refresh works by using RangeStart and RangeEnd parameters to refresh only recent partitions while retaining historical data.","children":[],"payload":{"tag":"li","lines":"286,288"}}],"payload":{"tag":"h4","lines":"285,286"}},{"content":"How do you reduce Power BI model size?","children":[{"content":"I reduced Power BI model size by removing unused columns, filtering unnecessary rows, optimizing data types, and reducing cardinality.","children":[],"payload":{"tag":"li","lines":"289,291"}}],"payload":{"tag":"h4","lines":"288,289"}},{"content":"Why should unused columns be removed?","children":[{"content":"Unused columns should be removed because they consume memory and increase dataset size without adding business value.","children":[],"payload":{"tag":"li","lines":"292,294"}}],"payload":{"tag":"h4","lines":"291,292"}},{"content":"Why should high-cardinality columns be avoided?","children":[{"content":"High-cardinality columns should be avoided because they increase memory usage and reduce compression efficiency.","children":[],"payload":{"tag":"li","lines":"295,297"}}],"payload":{"tag":"h4","lines":"294,295"}},{"content":"Calculated Column vs Measure &#x2013; performance difference?","children":[{"content":"Measures are calculated at query time and are more efficient, whereas Calculated Columns consume storage and increase model size.","children":[],"payload":{"tag":"li","lines":"298,300"}}],"payload":{"tag":"h4","lines":"297,298"}},{"content":"SUM vs SUMX &#x2013; performance difference?","children":[{"content":"SUM is faster because it performs simple aggregation, while SUMX iterates through each row before calculating the result.","children":[],"payload":{"tag":"li","lines":"301,303"}}],"payload":{"tag":"h4","lines":"300,301"}},{"content":"FILTER vs CALCULATE &#x2013; performance difference?","children":[{"content":"CALCULATE is optimized for modifying filter context, whereas FILTER creates row-by-row evaluation and is generally slower.","children":[],"payload":{"tag":"li","lines":"304,306"}}],"payload":{"tag":"h4","lines":"303,304"}},{"content":"Why should complex DAX expressions be avoided?","children":[{"content":"Complex DAX expressions should be avoided because they increase query execution time and reduce report performance.","children":[],"payload":{"tag":"li","lines":"307,309"}}],"payload":{"tag":"h4","lines":"306,307"}},{"content":"How do you optimize visuals?","children":[{"content":"I optimized visuals by limiting the number of visuals per page, reducing unnecessary interactions, and using efficient charts.","children":[],"payload":{"tag":"li","lines":"310,312"}}],"payload":{"tag":"h4","lines":"309,310"}},{"content":"Why should too many slicers be avoided?","children":[{"content":"Too many slicers should be avoided because each slicer generates additional queries and increases report rendering time.","children":[],"payload":{"tag":"li","lines":"313,315"}}],"payload":{"tag":"h4","lines":"312,313"}},{"content":"What makes a Power BI report slow?","children":[{"content":"A Power BI report becomes slow due to large datasets, complex DAX, poor data modeling, excessive visuals, high-cardinality columns, and DirectQuery latency.","children":[],"payload":{"tag":"li","lines":"316,318"}}],"payload":{"tag":"h4","lines":"315,316"}},{"content":"What happens during dataset refresh?","children":[{"content":"During dataset refresh, Power BI extracts data from the source, applies Power Query transformations, updates the data model, recalculates relationships and measures, and refreshes the reports.","children":[],"payload":{"tag":"li","lines":"319,321"}}],"payload":{"tag":"h4","lines":"318,319"}},{"content":"How did you reduce dashboard refresh time?","children":[{"content":"I reduced dashboard refresh time by filtering and aggregating data in SQL, removing unnecessary columns, and implementing Incremental Refresh.","children":[],"payload":{"tag":"li","lines":"322,324"}}],"payload":{"tag":"h4","lines":"321,322"}}],"payload":{"tag":"h3","lines":"262,263"}},{"content":"ETL Performance","children":[{"content":"Explain your ETL process.","children":[{"content":"Our ETL process extracted data from ERP, CRM, and JDA systems, transformed it using SSIS, and loaded it into SQL Server for Power BI reporting.","children":[],"payload":{"tag":"li","lines":"327,329"}}],"payload":{"tag":"h4","lines":"326,327"}},{"content":"How did you validate ETL?","children":[{"content":"I validated ETL by checking row counts, NULL values, duplicate records, allocation balance, and data freshness using SQL queries.","children":[],"payload":{"tag":"li","lines":"330,332"}}],"payload":{"tag":"h4","lines":"329,330"}},{"content":"How do you validate row counts?","children":[{"content":"I validated row counts by comparing the total records loaded into SQL Server with the expected source record count.","children":[],"payload":{"tag":"li","lines":"333,335"}}],"payload":{"tag":"h4","lines":"332,333"}},{"content":"How do you check duplicate records?","children":[{"content":"I checked duplicate records using GROUP BY with HAVING COUNT(*) &gt; 1 on business key columns.","children":[],"payload":{"tag":"li","lines":"336,338"}}],"payload":{"tag":"h4","lines":"335,336"}},{"content":"How do you validate NULL values?","children":[{"content":"I validated NULL values by checking mandatory fields like Store_ID, Product_ID, and Allocated_Qty using SQL.","children":[],"payload":{"tag":"li","lines":"339,341"}}],"payload":{"tag":"h4","lines":"338,339"}},{"content":"How do you verify the latest ETL load?","children":[{"content":"I verified the latest ETL load by checking the maximum load date or business date in the target table.","children":[],"payload":{"tag":"li","lines":"342,344"}}],"payload":{"tag":"h4","lines":"341,342"}},{"content":"What happens if ETL fails?","children":[{"content":"If ETL failed, I identified the failed job, validated the missing data, informed the Data Engineering team, and refreshed Power BI only after successful reload.","children":[],"payload":{"tag":"li","lines":"345,347"}}],"payload":{"tag":"h4","lines":"344,345"}},{"content":"How do you identify ETL failures?","children":[{"content":"I identified ETL failures by monitoring SSIS job status, SQL validation results, and missing or stale data in Power BI reports.","children":[],"payload":{"tag":"li","lines":"348,350"}}],"payload":{"tag":"h4","lines":"347,348"}},{"content":"Full Load vs Incremental Load?","children":[{"content":"Full Load reloads the entire dataset, whereas Incremental Load processes only new or modified records.","children":[],"payload":{"tag":"li","lines":"351,353"}}],"payload":{"tag":"h4","lines":"350,351"}},{"content":"Why use Incremental Load?","children":[{"content":"Incremental Load reduces ETL time, minimizes system load, and improves refresh performance by processing only changed data.","children":[],"payload":{"tag":"li","lines":"354,356"}}],"payload":{"tag":"h4","lines":"353,354"}},{"content":"How do you optimize ETL performance?","children":[{"content":"I optimized ETL performance by using Incremental Loads, filtering unnecessary data, optimizing SQL queries, and loading only required columns.","children":[],"payload":{"tag":"li","lines":"357,359"}}],"payload":{"tag":"h4","lines":"356,357"}},{"content":"What happens after ETL completes?","children":[{"content":"After ETL completed, I validated the loaded data using SQL and then refreshed the Power BI dataset.","children":[],"payload":{"tag":"li","lines":"360,362"}}],"payload":{"tag":"h4","lines":"359,360"}},{"content":"How is Power BI connected after ETL?","children":[{"content":"Power BI connected directly to SQL Server using Import Mode to retrieve the validated data for reporting.","children":[],"payload":{"tag":"li","lines":"363,365"}}],"payload":{"tag":"h4","lines":"362,363"}},{"content":"How do SQL Views help ETL?","children":[{"content":"SQL Views simplified ETL and reporting by providing pre-joined, business-ready datasets for Power BI.","children":[],"payload":{"tag":"li","lines":"366,368"}}],"payload":{"tag":"h4","lines":"365,366"}},{"content":"Why use Stored Procedures after ETL?","children":[{"content":"Stored Procedures automated post-ETL processing, business validations, aggregations, and data preparation before reporting.","children":[],"payload":{"tag":"li","lines":"369,371"}}],"payload":{"tag":"h4","lines":"368,369"}}],"payload":{"tag":"h3","lines":"324,325"}},{"content":"Data Modeling Performance","children":[{"content":"Why did you use Star Schema?","children":[{"content":"I used a Star Schema because it improves query performance, simplifies relationships, and provides faster report rendering compared to complex models.","children":[],"payload":{"tag":"li","lines":"374,376"}}],"payload":{"tag":"h4","lines":"373,374"}},{"content":"Why avoid Snowflake Schema?","children":[{"content":"I avoided Snowflake Schema because it introduces additional joins, making queries slower and the data model more complex.","children":[],"payload":{"tag":"li","lines":"377,379"}}],"payload":{"tag":"h4","lines":"376,377"}},{"content":"Fact Table vs Dimension Table?","children":[{"content":"A Fact Table stores measurable business transactions, while Dimension Tables store descriptive attributes used for filtering and analysis.","children":[],"payload":{"tag":"li","lines":"380,382"}}],"payload":{"tag":"h4","lines":"379,380"}},{"content":"Why use surrogate keys?","children":[{"content":"I used surrogate keys because they provide unique, stable identifiers and improve relationship management.","children":[],"payload":{"tag":"li","lines":"383,385"}}],"payload":{"tag":"h4","lines":"382,383"}},{"content":"Why use one-to-many relationships?","children":[{"content":"I used one-to-many relationships because they are efficient, reduce ambiguity, and provide better query performance.","children":[],"payload":{"tag":"li","lines":"386,388"}}],"payload":{"tag":"h4","lines":"385,386"}},{"content":"Why use single-direction filtering?","children":[{"content":"I used single-direction filtering because it avoids ambiguous filter paths and improves model performance.","children":[],"payload":{"tag":"li","lines":"389,391"}}],"payload":{"tag":"h4","lines":"388,389"}},{"content":"What causes ambiguous relationships?","children":[{"content":"Ambiguous relationships occur when multiple filter paths exist between tables, causing incorrect or unpredictable results.","children":[],"payload":{"tag":"li","lines":"392,394"}}],"payload":{"tag":"h4","lines":"391,392"}},{"content":"Active vs Inactive relationships?","children":[{"content":"An Active relationship is used by default in calculations, while an Inactive relationship must be activated using USERELATIONSHIP().","children":[],"payload":{"tag":"li","lines":"395,397"}}],"payload":{"tag":"h4","lines":"394,395"}},{"content":"Why create a Date Table?","children":[{"content":"I created a Date Table to enable time intelligence functions like YTD, MTD, QTD, and YoY analysis.","children":[],"payload":{"tag":"li","lines":"398,400"}}],"payload":{"tag":"h4","lines":"397,398"}},{"content":"Why hide technical columns?","children":[{"content":"I hid technical columns such as IDs and keys to simplify the report view for business users.","children":[],"payload":{"tag":"li","lines":"401,403"}}],"payload":{"tag":"h4","lines":"400,401"}},{"content":"How do you reduce model complexity?","children":[{"content":"I reduced model complexity by using a Star Schema, removing unnecessary columns, hiding technical fields, and avoiding redundant relationships.","children":[],"payload":{"tag":"li","lines":"404,406"}}],"payload":{"tag":"h4","lines":"403,404"}},{"content":"Why normalize in SQL but use Star Schema in Power BI?","children":[{"content":"SQL is normalized to reduce data redundancy, while Power BI uses a Star Schema for faster analytical queries and reporting.","children":[],"payload":{"tag":"li","lines":"407,409"}}],"payload":{"tag":"h4","lines":"406,407"}},{"content":"Why avoid many-to-many relationships?","children":[{"content":"I avoided many-to-many relationships because they increase model complexity, reduce performance, and can create ambiguous filter paths.","children":[],"payload":{"tag":"li","lines":"410,412"}}],"payload":{"tag":"h4","lines":"409,410"}},{"content":"How do calculated columns affect performance?","children":[{"content":"Calculated Columns increase model size because values are stored in memory for every row.","children":[],"payload":{"tag":"li","lines":"413,415"}}],"payload":{"tag":"h4","lines":"412,413"}},{"content":"Why are measures better for performance?","children":[{"content":"Measures are better for performance because they are calculated only at query time and do not consume additional storage.","children":[],"payload":{"tag":"li","lines":"416,418"}}],"payload":{"tag":"h4","lines":"415,416"}}],"payload":{"tag":"h3","lines":"371,372"}},{"content":"DAX Performance","children":[{"content":"SUM vs SUMX?","children":[{"content":"SUM is faster because it performs direct aggregation, whereas SUMX iterates through each row before calculating the result.","children":[],"payload":{"tag":"li","lines":"421,423"}}],"payload":{"tag":"h4","lines":"420,421"}},{"content":"COUNT vs COUNTROWS?","children":[{"content":"COUNT counts non-NULL values in a column, whereas COUNTROWS counts the total number of rows in a table and is generally more efficient.","children":[],"payload":{"tag":"li","lines":"424,426"}}],"payload":{"tag":"h4","lines":"423,424"}},{"content":"ALL vs ALLEXCEPT vs ALLSELECTED?","children":[{"content":"ALL removes all filters, ALLEXCEPT removes all filters except specified columns, and ALLSELECTED keeps user-selected filters while removing visual-level filters.","children":[],"payload":{"tag":"li","lines":"427,429"}}],"payload":{"tag":"h4","lines":"426,427"}},{"content":"VALUES vs DISTINCT?","children":[{"content":"VALUES returns distinct values and may include a blank row, whereas DISTINCT returns only unique values from existing data.","children":[],"payload":{"tag":"li","lines":"430,432"}}],"payload":{"tag":"h4","lines":"429,430"}},{"content":"How do you optimize CALCULATE?","children":[{"content":"I optimize CALCULATE by avoiding unnecessary nested filters and using simple filter expressions wherever possible.","children":[],"payload":{"tag":"li","lines":"433,435"}}],"payload":{"tag":"h4","lines":"432,433"}},{"content":"How do you optimize FILTER?","children":[{"content":"I optimize FILTER by filtering only required rows and avoiding its use inside iterator functions whenever possible.","children":[],"payload":{"tag":"li","lines":"436,438"}}],"payload":{"tag":"h4","lines":"435,436"}},{"content":"Why use DIVIDE instead of / ?","children":[{"content":"I use DIVIDE instead of / because it safely handles divide-by-zero errors and improves code readability.","children":[],"payload":{"tag":"li","lines":"439,441"}}],"payload":{"tag":"h4","lines":"438,439"}},{"content":"How do variables (VAR) improve DAX performance?","children":[{"content":"VAR improves DAX performance by storing intermediate results and avoiding repeated calculations.","children":[],"payload":{"tag":"li","lines":"442,444"}}],"payload":{"tag":"h4","lines":"441,442"}},{"content":"Why avoid nested IF statements?","children":[{"content":"I avoid nested IF statements because they reduce readability and are slower than SWITCH for multiple conditions.","children":[],"payload":{"tag":"li","lines":"445,447"}}],"payload":{"tag":"h4","lines":"444,445"}},{"content":"SWITCH vs IF &#x2013; performance comparison?","children":[{"content":"SWITCH generally performs better than multiple nested IF statements because it evaluates conditions more efficiently.","children":[],"payload":{"tag":"li","lines":"448,450"}}],"payload":{"tag":"h4","lines":"447,448"}},{"content":"How do iterator functions affect performance?","children":[{"content":"Iterator functions like SUMX and AVERAGEX process data row by row, making them slower than simple aggregation functions.","children":[],"payload":{"tag":"li","lines":"451,453"}}],"payload":{"tag":"h4","lines":"450,451"}},{"content":"Explain Context Transition.","children":[{"content":"Context Transition occurs when CALCULATE converts Row Context into Filter Context to evaluate measures correctly.","children":[],"payload":{"tag":"li","lines":"454,456"}}],"payload":{"tag":"h4","lines":"453,454"}},{"content":"Row Context vs Filter Context?","children":[{"content":"Row Context evaluates one row at a time, while Filter Context evaluates data based on applied filters and slicers.","children":[],"payload":{"tag":"li","lines":"457,459"}}],"payload":{"tag":"h4","lines":"456,457"}},{"content":"Why avoid calculated columns for aggregations?","children":[{"content":"I avoid calculated columns for aggregations because they increase model size, whereas measures calculate results dynamically at query time.","children":[],"payload":{"tag":"li","lines":"460,462"}}],"payload":{"tag":"h4","lines":"459,460"}},{"content":"How do you debug DAX performance issues?","children":[{"content":"I debug DAX performance using Performance Analyzer, DAX Studio, and by reviewing query execution time and expensive measures.","children":[],"payload":{"tag":"li","lines":"463,465"}}],"payload":{"tag":"h4","lines":"462,463"}}],"payload":{"tag":"h3","lines":"418,419"}},{"content":"Production Support","children":[{"content":"Power BI report is slow&#x2014;what will you check?","children":[{"content":"If a Power BI report is slow, I check the data model, DAX measures, visual count, relationships, dataset size, and Performance Analyzer to identify bottlenecks.","children":[],"payload":{"tag":"li","lines":"468,470"}}],"payload":{"tag":"h4","lines":"467,468"}},{"content":"SQL query suddenly becomes slow&#x2014;what will you check?","children":[{"content":"If a SQL query suddenly becomes slow, I check the execution plan, indexes, statistics, blocking sessions, and recent data volume changes.","children":[],"payload":{"tag":"li","lines":"471,473"}}],"payload":{"tag":"h4","lines":"470,471"}},{"content":"Dashboard refresh fails&#x2014;what will you do?","children":[{"content":"If a dashboard refresh fails, I check the refresh history, gateway status, ETL completion, SQL connectivity, and dataset errors before rerunning the refresh.","children":[],"payload":{"tag":"li","lines":"474,476"}}],"payload":{"tag":"h4","lines":"473,474"}},{"content":"KPI values changed unexpectedly&#x2014;how will you investigate?","children":[{"content":"If KPI values change unexpectedly, I validate the SQL source data, ETL output, DAX measures, filters, and recent business rule changes.","children":[],"payload":{"tag":"li","lines":"477,479"}}],"payload":{"tag":"h4","lines":"476,477"}},{"content":"Users report incorrect numbers&#x2014;how will you validate?","children":[{"content":"If users report incorrect numbers, I compare Power BI results with SQL query outputs and verify filters, relationships, and DAX calculations.","children":[],"payload":{"tag":"li","lines":"480,482"}}],"payload":{"tag":"h4","lines":"479,480"}},{"content":"Production ETL failed&#x2014;what are your next steps?","children":[{"content":"If a production ETL fails, I identify the failed job, inform the Data Engineering team, validate the reloaded data, and refresh Power BI only after successful completion.","children":[],"payload":{"tag":"li","lines":"483,485"}}],"payload":{"tag":"h4","lines":"482,483"}},{"content":"How do you troubleshoot performance issues?","children":[{"content":"I troubleshoot performance issues by identifying the bottleneck, analyzing SQL queries, DAX measures, data model, visuals, and refresh logs.","children":[],"payload":{"tag":"li","lines":"486,488"}}],"payload":{"tag":"h4","lines":"485,486"}},{"content":"How do you prioritize production incidents?","children":[{"content":"I prioritize production incidents based on business impact and SLA, resolving critical reporting and data issues before enhancement requests.","children":[],"payload":{"tag":"li","lines":"489,491"}}],"payload":{"tag":"h4","lines":"488,489"}},{"content":"Tell me about a production issue you solved.","children":[{"content":"One production issue I resolved involved incorrect WOC values caused by incomplete ETL data; I validated the issue using SQL, coordinated the ETL reload, and republished the dashboard after verification.","children":[],"payload":{"tag":"li","lines":"492,494"}}],"payload":{"tag":"h4","lines":"491,492"}},{"content":"How do you monitor scheduled refreshes?","children":[{"content":"I monitor scheduled refreshes using the Power BI Service refresh history, gateway status, refresh notifications, and daily data validation queries.","children":[],"payload":{"tag":"li","lines":"495,497"}}],"payload":{"tag":"h4","lines":"494,495"}}],"payload":{"tag":"h3","lines":"465,466"}},{"content":"Microsoft Fabric","children":[{"content":"Why Microsoft Fabric instead of SQL Server?","children":[{"content":"Microsoft Fabric provides an end-to-end unified analytics platform, whereas SQL Server is primarily a relational database for storing and querying data.","children":[],"payload":{"tag":"li","lines":"500,502"}}],"payload":{"tag":"h4","lines":"499,500"}},{"content":"Direct Lake vs Import Mode?","children":[{"content":"Direct Lake reads data directly from OneLake without importing it, while Import Mode loads data into Power BI memory.","children":[],"payload":{"tag":"li","lines":"503,505"}}],"payload":{"tag":"h4","lines":"502,503"}},{"content":"What are the benefits of OneLake?","children":[{"content":"OneLake provides a single centralized storage layer, eliminating data duplication and enabling all Fabric workloads to access the same data.","children":[],"payload":{"tag":"li","lines":"506,508"}}],"payload":{"tag":"h4","lines":"505,506"}},{"content":"Lakehouse vs Warehouse?","children":[{"content":"A Lakehouse stores both structured and unstructured data for analytics, whereas a Warehouse stores structured, relational data optimized for SQL reporting.","children":[],"payload":{"tag":"li","lines":"509,511"}}],"payload":{"tag":"h4","lines":"508,509"}},{"content":"Why use Data Factory instead of SSIS?","children":[{"content":"Data Factory is a cloud-native integration service with orchestration and monitoring capabilities, whereas SSIS is an on-premises ETL tool.","children":[],"payload":{"tag":"li","lines":"512,514"}}],"payload":{"tag":"h4","lines":"511,512"}},{"content":"How does Direct Lake improve performance?","children":[{"content":"Direct Lake improves performance by eliminating data import and querying data directly from OneLake with near Import Mode speed.","children":[],"payload":{"tag":"li","lines":"515,517"}}],"payload":{"tag":"h4","lines":"514,515"}},{"content":"What is a Semantic Model?","children":[{"content":"A Semantic Model is the business layer containing tables, relationships, DAX measures, and KPIs that provides consistent reporting across Power BI.","children":[],"payload":{"tag":"li","lines":"518,520"}}],"payload":{"tag":"h4","lines":"517,518"}},{"content":"How does Copilot help analysts?","children":[{"content":"Copilot helps analysts by generating DAX, SQL, reports, summaries, and insights using natural language prompts.","children":[],"payload":{"tag":"li","lines":"521,523"}}],"payload":{"tag":"h4","lines":"520,521"}},{"content":"How does Data Activator improve operations?","children":[{"content":"Data Activator automatically monitors data and triggers alerts or actions when predefined business conditions are met.","children":[],"payload":{"tag":"li","lines":"524,526"}}],"payload":{"tag":"h4","lines":"523,524"}},{"content":"What are the limitations of Microsoft Fabric?","children":[{"content":"Microsoft Fabric currently has limitations such as Premium licensing requirements, evolving features, and dependence on the Microsoft ecosystem.","children":[],"payload":{"tag":"li","lines":"527,529"}}],"payload":{"tag":"h4","lines":"526,527"}}],"payload":{"tag":"h3","lines":"497,498"}},{"content":"General Performance","children":[{"content":"Tell me about the biggest performance issue you solved.","children":[{"content":"The biggest performance issue I solved was a slow Power BI dashboard caused by large datasets and inefficient queries; I optimized SQL, implemented a Star Schema, removed unnecessary columns, and reduced dashboard load time.","children":[],"payload":{"tag":"li","lines":"532,534"}}],"payload":{"tag":"h4","lines":"531,532"}},{"content":"How do you reduce dashboard refresh time?","children":[{"content":"I reduced dashboard refresh time by filtering and aggregating data in SQL, removing unnecessary columns, and implementing Incremental Refresh.","children":[],"payload":{"tag":"li","lines":"535,537"}}],"payload":{"tag":"h4","lines":"534,535"}},{"content":"What are Power BI performance best practices?","children":[{"content":"Power BI performance best practices include using a Star Schema, optimizing DAX, removing unused columns, reducing visuals, using measures instead of calculated columns, and enabling Incremental Refresh.","children":[],"payload":{"tag":"li","lines":"538,540"}}],"payload":{"tag":"h4","lines":"537,538"}},{"content":"What SQL performance best practices do you follow?","children":[{"content":"I follow SQL best practices by selecting only required columns, using indexes, filtering early, avoiding SELECT *, and reviewing execution plans.","children":[],"payload":{"tag":"li","lines":"541,543"}}],"payload":{"tag":"h4","lines":"540,541"}},{"content":"How do you optimize large datasets?","children":[{"content":"I optimize large datasets by aggregating data in SQL, removing unnecessary columns, using Incremental Refresh, and designing an efficient Star Schema.","children":[],"payload":{"tag":"li","lines":"544,546"}}],"payload":{"tag":"h4","lines":"543,544"}},{"content":"How would you handle 100 million rows?","children":[{"content":"For 100 million rows, I would use Incremental Refresh, table partitioning, aggregations, proper indexing, and efficient data modeling.","children":[],"payload":{"tag":"li","lines":"547,549"}}],"payload":{"tag":"h4","lines":"546,547"}},{"content":"How do you improve report loading time?","children":[{"content":"I improve report loading time by reducing visual interactions, optimizing DAX measures, limiting dataset size, and minimizing high-cardinality columns.","children":[],"payload":{"tag":"li","lines":"550,552"}}],"payload":{"tag":"h4","lines":"549,550"}},{"content":"How do you optimize memory usage?","children":[{"content":"I optimize memory usage by removing unused columns, reducing data types, avoiding calculated columns where possible, and lowering column cardinality.","children":[],"payload":{"tag":"li","lines":"553,555"}}],"payload":{"tag":"h4","lines":"552,553"}},{"content":"What is Query Folding?","children":[{"content":"Query Folding pushes Power Query transformations back to the source database so processing occurs in SQL Server instead of Power BI, improving refresh performance.","children":[],"payload":{"tag":"li","lines":"556,558"}}],"payload":{"tag":"h4","lines":"555,556"}},{"content":"How do you improve end-to-end reporting performance?","children":[{"content":"I improve end-to-end reporting performance by optimizing ETL, SQL queries, data modeling, DAX measures, and Power BI report design.","children":[],"payload":{"tag":"li","lines":"559,561"}}],"payload":{"tag":"h4","lines":"558,559"}}],"payload":{"tag":"h3","lines":"529,530"}},{"content":"Scenario-Based","children":[{"content":"Your dashboard refresh takes 40 minutes. What will you do?","children":[{"content":"If a dashboard refresh takes 40 minutes, I would optimize SQL queries, reduce dataset size, remove unnecessary columns, implement Incremental Refresh, and review Power Query transformations.","children":[],"payload":{"tag":"li","lines":"564,566"}}],"payload":{"tag":"h4","lines":"563,564"}},{"content":"A SQL query takes 5 minutes. How will you optimize it?","children":[{"content":"If a SQL query takes 5 minutes, I would analyze the execution plan, create or optimize indexes, avoid SELECT *, filter data early, and optimize joins.","children":[],"payload":{"tag":"li","lines":"567,569"}}],"payload":{"tag":"h4","lines":"566,567"}},{"content":"Business wants hourly refresh instead of daily. What changes are required?","children":[{"content":"To support hourly refresh, I would implement Incremental Refresh, optimize ETL pipelines, ensure gateway capacity, and schedule hourly dataset refreshes in Power BI Service.","children":[],"payload":{"tag":"li","lines":"570,572"}}],"payload":{"tag":"h4","lines":"569,570"}},{"content":"A Power BI visual loads slowly. How will you troubleshoot it?","children":[{"content":"If a Power BI visual loads slowly, I would use Performance Analyzer to identify the bottleneck, optimize DAX, reduce visual interactions, and simplify the data model.","children":[],"payload":{"tag":"li","lines":"573,575"}}],"payload":{"tag":"h4","lines":"572,573"}},{"content":"Dataset size increased from 2 GB to 10 GB. What will you do?","children":[{"content":"If the dataset size grows from 2 GB to 10 GB, I would remove unused columns, reduce cardinality, aggregate data, implement Incremental Refresh, and archive historical data.","children":[],"payload":{"tag":"li","lines":"576,578"}}],"payload":{"tag":"h4","lines":"575,576"}},{"content":"Report works in Desktop but is slow in Power BI Service. Why?","children":[{"content":"If the report is fast in Desktop but slow in Power BI Service, I would check gateway performance, refresh history, capacity utilization, dataset size, and Service resource limits.","children":[],"payload":{"tag":"li","lines":"579,581"}}],"payload":{"tag":"h4","lines":"578,579"}},{"content":"Business wants near real-time reporting. What architecture would you recommend?","children":[{"content":"For near real-time reporting, I would recommend Microsoft Fabric with Direct Lake or DirectQuery, combined with streaming or incremental data ingestion.","children":[],"payload":{"tag":"li","lines":"582,584"}}],"payload":{"tag":"h4","lines":"581,582"}},{"content":"How would Microsoft Fabric improve your current project?","children":[{"content":"Microsoft Fabric would improve my project by providing OneLake, Direct Lake, integrated ETL, centralized storage, and faster end-to-end analytics.","children":[],"payload":{"tag":"li","lines":"585,587"}}],"payload":{"tag":"h4","lines":"584,585"}},{"content":"How would you optimize WOC calculation for millions of SKUs?","children":[{"content":"To optimize WOC calculation for millions of SKUs, I would pre-aggregate sales in SQL, optimize indexes, use efficient DAX measures, and enable Incremental Refresh.","children":[],"payload":{"tag":"li","lines":"588,590"}}],"payload":{"tag":"h4","lines":"587,588"}},{"content":"How would you scale your solution if the business expanded globally?","children":[{"content":"If the business expanded globally, I would scale the solution using Microsoft Fabric, OneLake, partitioned datasets, Incremental Refresh, regional data pipelines, and reusable Semantic Models.","children":[],"payload":{"tag":"li","lines":"591,593"}}],"payload":{"tag":"h4","lines":"590,591"}}],"payload":{"tag":"h3","lines":"561,562"}}],"payload":{"tag":"h2","lines":"182,183"}},{"content":"Handson","children":[{"content":"<strong>https://www.youtube.com/watch?v=1EFz1SaBdMs</strong>","children":[{"content":"Accenture: Asked Incremental Refresh in Power BI&#x1f632; | Data Analyst Interview","children":[],"payload":{"tag":"li","lines":"596,597"}}],"payload":{"tag":"li","lines":"595,597"}},{"content":"<strong>Types of Refresh</strong>","children":[{"content":"Manual Refresh &#x2013; Refresh manually.Scheduled Refresh &#x2013; Refresh at scheduled times.Incremental Refresh &#x2013; Refresh only new/changed data instead of the entire dataset.","children":[],"payload":{"tag":"li","lines":"598,599"}}],"payload":{"tag":"li","lines":"597,599"}},{"content":"<strong>What is Incremental Refresh?</strong>","children":[{"content":"Used for large datasets (millions of rows) in Import Mode. Only the required rows are refreshed instead of the complete table.","children":[],"payload":{"tag":"li","lines":"600,601"}}],"payload":{"tag":"li","lines":"599,601"}},{"content":"<strong>Prerequisite</strong>","children":[{"content":"A Date/DateTime column is mandatory (e.g., Order Date).","children":[],"payload":{"tag":"li","lines":"602,603"}}],"payload":{"tag":"li","lines":"601,603"}},{"content":"<strong>Step 1</strong>","children":[{"content":"Open Power Query &#x2192; Manage Parameters &#x2192; Create parameters.","children":[],"payload":{"tag":"li","lines":"604,605"}}],"payload":{"tag":"li","lines":"603,605"}},{"content":"<strong>Parameters</strong>","children":[{"content":"Create RangeStart and RangeEnd parameters exactly with these names.","children":[],"payload":{"tag":"li","lines":"606,607"}}],"payload":{"tag":"li","lines":"605,607"}},{"content":"<strong>Parameter Data Type</strong>","children":[{"content":"Both RangeStart and RangeEnd must have DateTime data type.","children":[],"payload":{"tag":"li","lines":"608,609"}}],"payload":{"tag":"li","lines":"607,609"}},{"content":"<strong>RangeStart Value</strong>","children":[{"content":"Set the initial order date of the dataset as the current value.","children":[],"payload":{"tag":"li","lines":"610,611"}}],"payload":{"tag":"li","lines":"609,611"}},{"content":"<strong>RangeEnd Value</strong>","children":[{"content":"Set any suitable end date as the current value.","children":[],"payload":{"tag":"li","lines":"612,613"}}],"payload":{"tag":"li","lines":"611,613"}},{"content":"<strong>Configure Filter</strong>","children":[{"content":"Apply a custom filter on Order Date:Order Date &gt;= RangeStartOrder Date &lt; RangeEnd","children":[],"payload":{"tag":"li","lines":"614,615"}}],"payload":{"tag":"li","lines":"613,615"}},{"content":"<strong>Important Check</strong>","children":[{"content":"Ensure Order Date data type is DateTime; otherwise, parameters won&apos;t appear in the filter options.","children":[],"payload":{"tag":"li","lines":"616,617"}}],"payload":{"tag":"li","lines":"615,617"}},{"content":"<strong>Load Data</strong>","children":[{"content":"Click Close &amp; Apply after configuring the filter.","children":[],"payload":{"tag":"li","lines":"618,619"}}],"payload":{"tag":"li","lines":"617,619"}},{"content":"<strong>Enable Incremental Refresh</strong>","children":[{"content":"Select the table &#x2192; Click Incremental Refresh &#x2192; Enable Incrementally refresh this table.","children":[],"payload":{"tag":"li","lines":"620,621"}}],"payload":{"tag":"li","lines":"619,621"}},{"content":"<strong>Archive Data</strong>","children":[{"content":"Configure how much historical data should be archived (Example: 1 Year).","children":[],"payload":{"tag":"li","lines":"622,623"}}],"payload":{"tag":"li","lines":"621,623"}},{"content":"<strong>Incremental Period</strong>","children":[{"content":"Configure how much recent data should be refreshed (Example: 1 Month).","children":[],"payload":{"tag":"li","lines":"624,625"}}],"payload":{"tag":"li","lines":"623,625"}},{"content":"<strong>Detect Data Changes</strong>","children":[{"content":"Enable Detect Data Changes and select the tracking column (e.g., Order Date) so refresh happens only when data changes.","children":[],"payload":{"tag":"li","lines":"626,627"}}],"payload":{"tag":"li","lines":"625,627"}},{"content":"<strong>DirectQuery Option</strong>","children":[{"content":"Real-time data is available only with DirectQuery in Power BI Premium.","children":[],"payload":{"tag":"li","lines":"628,629"}}],"payload":{"tag":"li","lines":"627,629"}},{"content":"<strong>Only Refresh Complete Periods</strong>","children":[{"content":"Option available to refresh only complete months if required.","children":[],"payload":{"tag":"li","lines":"630,631"}}],"payload":{"tag":"li","lines":"629,631"}},{"content":"<strong>Review &amp; Apply</strong>","children":[{"content":"Review archive period, refresh period, and refresh date before clicking Apply.","children":[],"payload":{"tag":"li","lines":"632,633"}}],"payload":{"tag":"li","lines":"631,633"}},{"content":"<strong>Benefits</strong>","children":[{"content":"Reduces refresh time, processes only new/changed data, improves performance for large datasets.","children":[],"payload":{"tag":"li","lines":"634,635"}}],"payload":{"tag":"li","lines":"633,635"}},{"content":"<strong>Limitation</strong>","children":[{"content":"After publishing a PBIX with Incremental Refresh to Power BI Service, the PBIX cannot be downloaded. Keep a backup of the original PBIX file.","children":[],"payload":{"tag":"li","lines":"636,637"}}],"payload":{"tag":"li","lines":"635,637"}},{"content":"<strong>Interview Keywords</strong>","children":[{"content":"Large Dataset, Import Mode, RangeStart, RangeEnd, DateTime, Archive Data, Incremental Period, Detect Data Changes, Performance Optimization, Power BI Premium.","children":[],"payload":{"tag":"li","lines":"638,639"}}],"payload":{"tag":"li","lines":"637,639"}},{"content":"<strong>foreign [Music] phases several terminologies regarding data modeling now we will discuss some of the very common interview questions which you may come across in data modeling interviews or maybe sometimes you may come across this in a data architecture interview or data</strong>","children":[{"content":"engineering interview as well so the first question is what is the difference between the data warehouse and the data lake so the answer will be data warehouse is uh having data warehouse has more cleansed aggregated transformed data which are basically structured and unified for","children":[],"payload":{"tag":"li","lines":"640,641"}},{"content":"to support a specific business needs or the specific business intelligent dashboards you are not having raw data and when you are building the data warehouse you already know what are your business needs so it is having only the structure transformed cleansed business aggregated","children":[],"payload":{"tag":"li","lines":"641,642"}},{"content":"data now coming to data Lake data Lake holds the organization level raw data which are unstructured and several business teams comes into Data Lake they access the data likes data and apply their own business rules own business logic to get their insights so uh now you may ask a","children":[],"payload":{"tag":"li","lines":"642,643"}},{"content":"question like you know in that case why do we need data link because data lake is having raw unstructured data so the business teams have to perform all the Transformations right so then then why we need that we can go ahead with data warehouse
